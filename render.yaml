# Render Blueprint — deploys Cadence (API + bundled workspace UI) as one
# managed web service. https://render.com/docs/blueprint-spec
services:
  - type: web
    name: cadence
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -e ".[api]"
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    # No healthCheckPath on the free plan: the CPU-throttled instance can miss
    # an occasional health probe, which evicts it from rotation and causes
    # intermittent 404s. Add `healthCheckPath: /healthz` on a paid plan.
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
