# Render Blueprint — deploys the API as a managed web service.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: recurrence-engine-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -e ".[api]"
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
